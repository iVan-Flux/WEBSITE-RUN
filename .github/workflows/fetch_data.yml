name: Generate and Sync ivan-web to Dual Cloudflare KV

on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিটে রান হবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার জন্য

jobs:
  build_and_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      # ধাপ ১: ফায়ারবেস থেকে ডাটা নিয়ে ivan-web.json জেনারেট করা
      - name: Run Data Generator
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py

      # ধাপ ২: ১ম ক্লাউডফ্লেয়ার আপলোড ও পার্জ (ফেইল করলেও রানার ২য় ধাপে চলে যাবে)
      - name: Sync & Purge Cloudflare 1
        continue-on-error: true # এই লাইনটি ১ম অ্যাকাউন্ট ফেইল করলেও কাজ সচল রাখবে
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID_1 }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN_1 }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_1 }}
          CF_PURGE_URL: "https://api.footmad-ivan-flux.shop/ivan-web"
        run: |
          if [ -f "ivan-web.json" ]; then
            echo "Uploading to Cloudflare 1..."
            upload_response=$(curl -s -w "%{http_code}" -o response.json -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/ivan-web" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"ivan-web.json")
            
            if [ "$upload_response" -eq 200 ]; then
              echo "Successfully uploaded to Cloudflare 1."
              
              if [ ! -z "${CF_ZONE_ID}" ]; then
                echo "Purging cache for ${CF_PURGE_URL}..."
                purge_response=$(curl -s -w "%{http_code}" -o purge_response.json -X POST \
                  "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"files\":[\"${CF_PURGE_URL}\"]}")
                
                if [ "$purge_response" -eq 200 ]; then
                  echo "Successfully purged cache on Cloudflare 1."
                else
                  echo "Failed to purge cache on Cloudflare 1. HTTP: $purge_response"
                  cat purge_response.json
                  exit 1
                fi
              fi
            else
              echo "Failed to upload to Cloudflare 1. HTTP: $upload_response"
              cat response.json
              exit 1
            fi
          else
            echo "Error: ivan-web.json was not generated!"
            exit 1
          fi

      # ধাপ ৩: ২য় ক্লাউডফ্লেয়ার আপলোড ও পার্জ (১ম অ্যাকাউন্ট ফেইল করলেও এটি রান হবে)
      - name: Sync & Purge Cloudflare 2
        continue-on-error: true # এই লাইনটি ২য় অ্যাকাউন্ট ফেইল করলেও পুরো জব সচল রাখবে
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID_2 }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN_2 }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_2 }}
          CF_PURGE_URL: "https://api-ivan-flux.janinakoitumi.site/ivan-web"
        run: |
          if [ -f "ivan-web.json" ]; then
            echo "Uploading to Cloudflare 2..."
            upload_response=$(curl -s -w "%{http_code}" -o response.json -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/ivan-web" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"ivan-web.json")
            
            if [ "$upload_response" -eq 200 ]; then
              echo "Successfully uploaded to Cloudflare 2."
              
              if [ ! -z "${CF_ZONE_ID}" ]; then
                echo "Purging cache for ${CF_PURGE_URL}..."
                purge_response=$(curl -s -w "%{http_code}" -o purge_response.json -X POST \
                  "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"files\":[\"${CF_PURGE_URL}\"]}")
                
                if [ "$purge_response" -eq 200 ]; then
                  echo "Successfully purged cache on Cloudflare 2."
                else
                  echo "Failed to purge cache on Cloudflare 2. HTTP: $purge_response"
                  cat purge_response.json
                  exit 1
                fi
              fi
            else
              echo "Failed to upload to Cloudflare 2. HTTP: $upload_response"
              cat response.json
              exit 1
            fi
          else
            echo "Error: ivan-web.json was not generated!"
            exit 1
          fi
